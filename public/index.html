<!doctype html>
<html lang="en">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>KD rotation helper</title>
<style>
  @font-face{
    font-family:"DSEG14";
    src:url("DSEG14ClassicMini-Regular.woff2") format("woff2");
    font-weight:400;font-style:normal;font-display:swap;
  }
  :root{
    --bg:#f6f5f2; --surface:#ffffff; --text:#1d1c24; --muted:#6c6979; --hint:#9a97a8;
    --border:rgba(0,0,0,.12); --accent:#5750c9; --accent-soft:rgba(87,80,201,.12);
    --shadow:0 10px 34px rgba(20,18,40,.16);
    --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;
    --sans:"Segoe UI",system-ui,-apple-system,Helvetica,Arial,sans-serif;
  }
  /* Dark palette: applied automatically when the system prefers dark (unless the
     user forced light), and always when the user explicitly toggles dark. */
  @media (prefers-color-scheme:dark){
    :root:not([data-theme="light"]){--bg:#000000;--surface:#1c1b25;--text:#ece9f1;--muted:#9b97ad;--hint:#6c6880;
          --border:rgba(255,255,255,.13);--accent:#8b83ef;--accent-soft:rgba(139,131,239,.18);
          --shadow:0 10px 34px rgba(0,0,0,.5)}
  }
  :root[data-theme="dark"]{--bg:#000000;--surface:#1c1b25;--text:#ece9f1;--muted:#9b97ad;--hint:#6c6880;
        --border:rgba(255,255,255,.13);--accent:#8b83ef;--accent-soft:rgba(139,131,239,.18);
        --shadow:0 10px 34px rgba(0,0,0,.5)}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
  /* The app fills the viewport and never scrolls; the dial is sized to fit (see applySize). */
  .app{position:relative;min-height:100vh;min-height:100dvh;display:flex;align-items:safe center;justify-content:safe center;padding:12px;overflow:hidden}
  /* touch-action:none lets us own pinch gestures on the dial instead of the browser. */
  .dial{width:640px;touch-action:none}
  .dial svg{display:block;width:100%;height:auto}
  .rd-count{font-family:"DSEG14",var(--mono);font-size:22px;font-weight:400;fill:var(--text)}
  .rd-bg{opacity:.13}
  .corner-count{position:fixed;left:16px;bottom:14px;z-index:5;font-family:var(--mono);font-size:15px;color:var(--muted);font-variant-numeric:tabular-nums;pointer-events:none}
  .corner-count[hidden]{display:none}
  .rd-label{font-size:10px;letter-spacing:.16em;fill:var(--hint)}
  .id-text{font-family:var(--sans);font-weight:700;fill:var(--text);stroke:var(--surface);paint-order:stroke;stroke-linejoin:round}
  /* Emoji glyphs must not be filled/stroked (that renders them blank on Safari/iOS); they
     also need an explicit colour-emoji font stack. */
  .id-emoji{font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif}

  .tools{position:fixed;top:18px;right:18px;z-index:5;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
  .gear{width:42px;height:42px;border-radius:11px;border:1px solid var(--border);background:var(--surface);
        color:var(--text);display:grid;place-items:center;cursor:pointer;box-shadow:var(--shadow)}
  .gear:hover{border-color:var(--muted)}
  .panel{width:272px;max-width:calc(100vw - 36px);background:var(--surface);border:1px solid var(--border);
         border-radius:14px;padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:16px;
         max-height:calc(100vh - 96px);max-height:calc(100dvh - 96px);overflow-y:auto;overscroll-behavior:contain}
  .grp{display:flex;flex-direction:column;gap:14px}
  .grp-h{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--hint)}
  .grp+.grp{padding-top:16px;border-top:1px solid var(--border)}
  .panel[hidden]{display:none}
  .row{display:flex;flex-direction:column;gap:6px}
  .rt{display:flex;justify-content:space-between;align-items:baseline}
  .name{font-size:13.5px}
  .val{font-family:var(--mono);font-size:13px;color:var(--muted)}
  input[type=range]{width:100%;accent-color:var(--accent);height:20px;cursor:pointer;margin:0}
  select{width:100%;font-family:var(--sans);font-size:13px;padding:7px 8px;border:1px solid var(--border);
    background:var(--surface);color:var(--text);border-radius:8px;cursor:pointer}
  .tog{flex-direction:row;justify-content:space-between;align-items:center}
  input[type=checkbox]{accent-color:var(--accent);width:18px;height:18px;cursor:pointer;margin:0}
  .seg-btns{display:flex;gap:6px}
  .seg-btns button{flex:1;font-family:var(--mono);font-size:12px;padding:7px 0;border:1px solid var(--border);
    background:transparent;color:var(--muted);border-radius:8px;cursor:pointer}
  .seg-btns button.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:600}
  #mode button{font-family:var(--sans);font-size:12.5px}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
  .qr-btn{width:100%;font-family:var(--sans);font-size:13px;padding:9px 0;border:1px solid var(--border);
    background:var(--accent-soft);color:var(--accent);border-radius:8px;cursor:pointer;font-weight:600;
    display:flex;align-items:center;justify-content:center;gap:8px}
  .qr-btn:hover{border-color:var(--accent)}
  .qr-btn svg{width:16px;height:16px}
  .repo-link{display:flex;align-items:center;justify-content:center;gap:7px;font-size:12.5px;color:var(--hint);
    text-decoration:none;padding-top:14px;border-top:1px solid var(--border)}
  .repo-link:hover{color:var(--accent)}
  .repo-link svg{width:15px;height:15px}
  .qr-modal{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
    padding:24px;cursor:pointer;background:rgba(10,9,20,.55);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
  .qr-modal[hidden]{display:none}
  .qr-card{background:#fff;border-radius:18px;padding:22px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;gap:14px;align-items:center;max-width:min(92vw,520px)}
  .qr-svg{width:min(80vw,440px);max-width:100%}
  .qr-svg svg{display:block;width:100%;height:auto}
  .qr-url{font-family:var(--mono);font-size:11px;line-height:1.45;color:#555;word-break:break-all;text-align:center;max-width:440px}
</style>

<div class="app">
  <h1 class="sr-only">Phase Wheel</h1>

  <div class="tools" id="tools">
    <button class="gear" id="gear" aria-label="Settings" aria-expanded="false">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
        <line x1="4" y1="8.5" x2="20" y2="8.5"/><circle cx="9" cy="8.5" r="2.4" fill="var(--surface)"/>
        <line x1="4" y1="15.5" x2="20" y2="15.5"/><circle cx="15" cy="15.5" r="2.4" fill="var(--surface)"/>
      </svg>
    </button>
    <div class="panel" id="panel" hidden>
      <div class="grp">
        <div class="grp-h">Sections</div>
        <div class="row">
          <div class="rt"><span class="name">Sections</span><span class="val" id="vN">8</span></div>
          <input type="range" id="N" min="2" max="20" step="1" value="8">
        </div>
        <div class="row">
          <div class="rt"><span class="name">Active at once</span><span class="val" id="vK">4</span></div>
          <input type="range" id="K" min="1" max="20" step="1" value="4">
        </div>
        <div class="row">
          <div class="rt"><span class="name">Switch every</span><span class="val" id="vI">5 min</span></div>
          <input type="range" id="I" min="2" max="10" step="1" value="5">
        </div>
        <div class="row">
          <div class="rt"><span class="name">Splits</span><span class="val" id="vS">1</span></div>
          <input type="range" id="S" min="1" max="20" step="1" value="1">
        </div>
      </div>
      <div class="grp">
        <div class="grp-h">Display</div>
        <div class="row">
          <div class="rt"><span class="name">Circle size</span><span class="val" id="vSZ">85%</span></div>
          <input type="range" id="SZ" min="20" max="100" step="5" value="85">
        </div>
        <div class="row">
          <div class="rt"><span class="name">Shape</span></div>
          <div class="seg-btns" id="mode">
            <button data-m="half">Half</button>
            <button data-m="full">Full</button>
            <button data-m="portrait">Portrait</button>
          </div>
        </div>
        <div class="row tog">
          <span class="name">Dark mode</span>
          <input type="checkbox" id="dark">
        </div>
        <div class="row">
          <div class="rt"><span class="name">Identifier</span></div>
          <select id="idsel">
            <option value="num">Numbers</option>
            <option value="alpha">Letters</option>
            <option value="animal">Animals</option>
            <option value="none">None</option>
          </select>
        </div>
        <div class="row">
          <div class="rt"><span class="name">Label position</span></div>
          <select id="lblpos">
            <option value="center">Centered</option>
            <option value="edge">Edge (stay visible)</option>
            <option value="now">At now line</option>
          </select>
        </div>
        <div class="row">
          <div class="rt"><span class="name">Speed</span></div>
          <div class="seg-btns" id="speed">
            <button data-x="1">1&times;</button>
            <button data-x="60">60&times;</button>
          </div>
        </div>
      </div>
      <div class="grp">
        <div class="grp-h">Share</div>
        <div class="row">
          <button class="qr-btn" id="qrbtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/><line x1="14" y1="14" x2="14" y2="21"/>
              <line x1="18" y1="14" x2="18" y2="18"/><line x1="21" y1="14" x2="21" y2="21"/><line x1="18" y1="21" x2="21" y2="21"/>
            </svg>
            Show QR code
          </button>
        </div>
      </div>
      <a class="repo-link" href="https://github.com/jonatan-petursson/kreativ-data-phase" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 .5C5.37.5 0 5.87 0 12.5c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58 0-.29-.01-1.04-.02-2.05-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.33-1.76-1.33-1.76-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.49.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.62-5.49 5.92.43.37.81 1.1.81 2.22 0 1.6-.01 2.9-.01 3.29 0 .32.22.7.83.58A12 12 0 0 0 24 12.5C24 5.87 18.63.5 12 .5z"/>
        </svg>
        View on GitHub
      </a>
    </div>
  </div>

  <div class="qr-modal" id="qrModal" hidden role="dialog" aria-modal="true" aria-label="Shareable QR code">
    <div class="qr-card">
      <div class="qr-svg" id="qrSvg"></div>
      <div class="qr-url" id="qrUrl"></div>
    </div>
  </div>

  <div class="dial" id="dial">
    <svg id="svg" viewBox="0 0 400 196" aria-hidden="true">
      <defs><clipPath id="top"><rect id="clip" x="0" y="0" width="400" height="190"></rect></clipPath></defs>
      <line id="base" x1="30" y1="190" x2="370" y2="190" stroke="var(--border)" stroke-width="1"></line>
      <g id="wrap" clip-path="url(#top)">
        <circle id="surface" cx="200" cy="190" r="82" fill="none"></circle>
        <g id="arcs"></g>
        <circle id="rimIn" cx="200" cy="190" r="83" fill="none" stroke="var(--border)" stroke-width="1"></circle>
        <circle id="rimOut" cx="200" cy="190" r="171" fill="none" stroke="var(--border)" stroke-width="1"></circle>
      </g>
      <line id="tick" stroke="var(--text)" stroke-width="2" stroke-linecap="round"></line>
      <g id="ptr">
        <path id="tri" fill="var(--text)"></path>
      </g>
      <text id="countbg" x="200" y="158" text-anchor="middle" class="rd-count rd-bg" aria-hidden="true">88:88</text>
      <text id="count" x="200" y="158" text-anchor="middle" class="rd-count">00:00</text>
      <circle id="hit" cx="200" cy="190" r="78" fill="transparent" style="cursor:pointer"><title>Tap to change shape</title></circle>
    </svg>
  </div>

  <div class="corner-count" id="cornerCount" aria-hidden="true" hidden>5:00</div>
</div>

<script src="qrcode.js" defer></script>
<script>
(function(){
  var CX=200,CY=190,R_OUT=170,R_IN=82,NS="http://www.w3.org/2000/svg";
  var reduce=false; try{reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;}catch(e){}
  function el(id){return document.getElementById(id);}
  var svg=el("svg"),arcsG=el("arcs"),ptrG=el("ptr"),countEl=el("count"),cornerEl=el("cornerCount");
  var ANIMALS=["\uD83D\uDC36","\uD83D\uDC31","\uD83D\uDC2D","\uD83D\uDC39","\uD83D\uDC30","\uD83E\uDD8A","\uD83D\uDC3B","\uD83D\uDC3C","\uD83D\uDC28","\uD83D\uDC2F","\uD83E\uDD81","\uD83D\uDC2E","\uD83D\uDC37","\uD83D\uDC38","\uD83D\uDC35","\uD83D\uDC14","\uD83D\uDC27","\uD83E\uDD86","\uD83E\uDD89","\uD83E\uDD84"];
  var MODES=["half","full","portrait"];
  var P={N:8,K:4,interval:5,bursts:1,speed:1,idMethod:"num",mode:"half",labelPos:"center",thick:0.9,size:85};
  var segs=[],idLabels=[],ringTh=0,pulse=0,lastSwitch=0,lastT=0,PHI=0;

  function polar(r,deg){var a=(deg-90)*Math.PI/180;return [CX+r*Math.cos(a),CY+r*Math.sin(a)];}
  function norm180(a){a=((a+180)%360+360)%360-180;return a;}
  function sector(a0,a1,rIn,rOut){
    var o1=polar(rOut,a0),o2=polar(rOut,a1),i2=polar(rIn,a1),i1=polar(rIn,a0),lg=(a1-a0)>180?1:0;
    return "M"+o1[0]+" "+o1[1]+" A"+rOut+" "+rOut+" 0 "+lg+" 1 "+o2[0]+" "+o2[1]+
           " L"+i2[0]+" "+i2[1]+" A"+rIn+" "+rIn+" 0 "+lg+" 0 "+i1[0]+" "+i1[1]+" Z";
  }
  function hue(i){var h=i*360/P.N,L=52-7*Math.cos((h-65)*Math.PI/180);return "hsl("+h.toFixed(1)+" 60% "+L.toFixed(1)+"%)";}
  function ident(i){
    if(P.idMethod==="none") return "";
    if(P.idMethod==="alpha") return String.fromCharCode(65+(i%26));
    if(P.idMethod==="animal") return ANIMALS[i%ANIMALS.length];
    return String(i+1);
  }
  function basePattern(){
    var on=P.K, off=P.N-P.K;
    if(off<=0) return [{start:0,len:P.N}];
    var b=Math.max(1,Math.min(P.bursts,on,off)),runs=[],pos=0;
    for(var r=0;r<b;r++){
      var rl=Math.floor((r+1)*on/b)-Math.floor(r*on/b);
      var gl=Math.floor((r+1)*off/b)-Math.floor(r*off/b);
      runs.push({start:pos,len:rl}); pos+=rl+gl;
    }
    return runs;
  }

  function build(){
    arcsG.innerHTML=""; segs=[]; idLabels=[];
    ringTh=(R_OUT-R_IN)/P.N;
    var slot=360/P.N, runs=basePattern();
    var th=ringTh*P.thick;
    for(var i=0;i<P.N;i++){
      var c=R_OUT-(i+0.5)*ringTh, rOut=c+th/2, rIn=c-th/2, rMid=c, lbl=ident(i);
      var fsMax=Math.max(6,Math.min(th*0.82,16));
      for(var r=0;r<runs.length;r++){
        var a0=(runs[r].start+i)*slot, w=Math.min(359.4,runs[r].len*slot);
        var p=document.createElementNS(NS,"path");
        p.setAttribute("d",sector(a0,a0+w,rIn,rOut));
        p.setAttribute("fill",hue(i)); p.setAttribute("opacity","0.2");
        arcsG.appendChild(p); segs.push({path:p,start:a0,width:w});
        if(lbl==="") continue; // "none" identifier method — no labels at all
        // Label sits at the segment midpoint by default; paint() may reposition it per
        // frame for the "edge" / "now" label modes (see P.labelPos).
        var pt=polar(rMid,a0+w/2), fs=fsMax, arcPx=w*Math.PI/180*rMid;
        if(fs>arcPx*0.72) fs=Math.max(5,arcPx*0.72);
        var t=document.createElementNS(NS,"text");
        t.setAttribute("x",pt[0]); t.setAttribute("y",pt[1]);
        t.setAttribute("text-anchor","middle"); t.setAttribute("dominant-baseline","central");
        t.setAttribute("font-size",fs.toFixed(1)); t.setAttribute("stroke-width",(fs*0.16).toFixed(2));
        t.setAttribute("class",P.idMethod==="animal"?"id-emoji":"id-text"); t.textContent=lbl;
        arcsG.appendChild(t); idLabels.push({el:t,tx:pt[0],ty:pt[1],a0:a0,w:w,rMid:rMid,fs:fs});
      }
    }
    el("tri").setAttribute("d","M"+(CX-8)+" "+(CY-R_OUT-15)+" L"+(CX+8)+" "+(CY-R_OUT-15)+" L"+CX+" "+(CY-R_OUT-2)+" Z");
    // The "now" line spans the whole segment area (outer rim to inner rim), rotated to the
    // pointer angle (PHI). It is hidden in the "now" label mode, where labels occupy it.
    var tick=el("tick");
    tick.setAttribute("x1",CX); tick.setAttribute("y1",CY-R_OUT-2);
    tick.setAttribute("x2",CX); tick.setAttribute("y2",CY-R_IN);
    tick.setAttribute("transform","rotate("+PHI+" "+CX+" "+CY+")");
    tick.setAttribute("display",P.labelPos==="now"?"none":"inline");
  }
  // Zero-padded MM:SS so the readout is always the same width as the "88:88" backdrop and
  // overlays it exactly (the segment font's digits are monospaced, the colon is narrow).
  function fmt(s){s=Math.max(0,Math.ceil(s));return ("0"+Math.floor(s/60)).slice(-2)+":"+("0"+(s%60)).slice(-2);}

  function paint(eff){
    var iv=P.interval*60, slot=360/P.N;
    var pointer=((eff/iv*slot)%360+360)%360;
    // Blink the active segments during the final 10s of the interval as a switch warning.
    // Driven by real wall-clock time (eff/speed) so the ~2Hz rate is steady at any speed.
    var rem=iv-(eff%iv), realT=eff/P.speed;
    var blinkOff=!reduce && rem<=10 && (Math.floor(realT*4)%2===1);
    // PHI is where the pointer sits (top for half/full, side for portrait); the wheel
    // rotates so the active arc-angle lands under it, and labels counter-rotate upright.
    arcsG.setAttribute("transform","rotate("+(PHI-pointer).toFixed(3)+" "+CX+" "+CY+")");
    for(var j=0;j<segs.length;j++){
      var s=segs[j], delta=((pointer-s.start)%360+360)%360;
      if(delta<s.width){var ramp=Math.min(6,s.width/2),edge=Math.min(delta,s.width-delta),k=ramp>0?Math.min(1,edge/ramp):1;
        // Only the segment about to end blinks — the one whose trailing edge crosses the
        // now line at the next switch (within one slot of fully passing it).
        var ending=delta>=s.width-slot;
        s.path.setAttribute("opacity",(blinkOff&&ending?0.18:(0.55+0.45*k)).toFixed(3));}
      else s.path.setAttribute("opacity","0.2");
    }
    // Label placement: "center" is static (set in build); "now" pins the label to the
    // pointer line; "edge" keeps the label inside both the visible window and its own
    // segment, each pulled in by a margin (~the label's half-height) so the label never sits
    // on the cut and slides out a margin ahead of the segment's edge instead of riding it.
    var pr=(pointer-PHI).toFixed(3), dyn=(P.labelPos!=="center"), vis=(P.mode==="full")?180:90;
    for(var m=0;m<idLabels.length;m++){var L=idLabels[m];
      if(dyn){
        var ang;
        if(P.labelPos==="now"){
          ang=pointer; // pinned to the now line at all times, regardless of the segment
        } else { // edge: margin off the window edge and off the segment edge (capped to the
                 // segment's half-width so a narrow segment just keeps the label centred)
          var sc=norm180(L.a0+L.w/2-pointer);
          var mg=(L.fs*0.7/L.rMid)*180/Math.PI, ve=vis-mg, sm=Math.min(mg,L.w/2);
          var lo=Math.max(sc-L.w/2+sm,Math.min(sc+L.w/2-sm,Math.max(-ve,Math.min(ve,sc))));
          ang=pointer+lo;
        }
        var pt=polar(L.rMid,ang); L.tx=pt[0]; L.ty=pt[1];
        L.el.setAttribute("x",L.tx); L.el.setAttribute("y",L.ty);
      }
      L.el.setAttribute("transform","rotate("+pr+" "+L.tx+" "+L.ty+")");}
    var sc=reduce?1:(1+pulse*0.5),px=CX,py=CY-R_OUT-8;
    ptrG.setAttribute("transform","rotate("+PHI+" "+CX+" "+CY+") translate("+px+" "+py+") scale("+sc.toFixed(3)+") translate("+(-px)+" "+(-py)+")");
    var t=fmt(iv-(eff%iv)); countEl.textContent=t; cornerEl.textContent=t;
  }
  function loop(){
    var eff=Date.now()/1000*P.speed, iv=P.interval*60, sw=Math.floor(eff/iv);
    if(sw!==lastSwitch){lastSwitch=sw;pulse=0.5;}
    var now=performance.now(), dt=lastT?Math.min(0.1,(now-lastT)/1000):0; lastT=now;
    if(pulse>0)pulse=Math.max(0,pulse-dt*1.8);
    paint(eff); requestAnimationFrame(loop);
  }

  function applyLayout(){
    var m=P.mode;
    // Centre, pointer angle (PHI) and viewBox per mode:
    //   half     — top pointer, horizontal split, show top semicircle
    //   full     — top pointer, whole circle
    //   portrait — left pointer, vertical split, show left semicircle (tall layout)
    if(m==="portrait"){ CX=190; CY=200; PHI=270; }
    else { CX=200; CY=(m==="full")?200:190; PHI=0; }
    // Portrait viewBox is widened past the cut edge (CX=190) so the centre-aligned clock
    // isn't clipped; the rings stay clipped to the left half via the clip rect below.
    svg.setAttribute("viewBox", m==="full"?"0 0 400 400" : m==="portrait"?"0 0 232 400" : "0 0 400 208");
    el("wrap").setAttribute("clip-path", m==="full"?"none":"url(#top)");
    // Clip to the visible semicircle: top half for "half", left half for "portrait".
    if(m==="portrait"){ el("clip").setAttribute("width",CX); el("clip").setAttribute("height",400); }
    else { el("clip").setAttribute("width",400); el("clip").setAttribute("height",CY); }
    el("base").setAttribute("display", m==="full"?"none":"inline");
    if(m==="portrait"){ el("base").setAttribute("x1",CX); el("base").setAttribute("y1",30); el("base").setAttribute("x2",CX); el("base").setAttribute("y2",370); }
    else { el("base").setAttribute("x1",30); el("base").setAttribute("y1",CY); el("base").setAttribute("x2",370); el("base").setAttribute("y2",CY); }
    // Gap the dividing line across the central hub (the inner circle) so it doesn't cross
    // the centre/clock. Line runs 30..370 (length 340); gap is the inner-circle diameter.
    var sol=170-R_IN; el("base").setAttribute("stroke-dasharray",sol+" "+(2*R_IN)+" "+sol);
    el("surface").setAttribute("cx",CX); el("rimIn").setAttribute("cx",CX); el("rimOut").setAttribute("cx",CX);
    el("surface").setAttribute("cy",CY); el("rimIn").setAttribute("cy",CY); el("rimOut").setAttribute("cy",CY);
    el("hit").setAttribute("cx",CX); el("hit").setAttribute("cy",CY);
    // Timer centred on the circle midpoint (CX,CY) in every mode. The font has no descent,
    // so baseline = CY + fontSize/2 (11) puts the glyph's visual centre on CY — i.e. on the
    // line through the circle. The page-corner timer is kept but disabled as dead code.
    var cx2=CX, cy2=CY+11;
    var cnt=el("count"), cbg=el("countbg");
    cnt.setAttribute("x",cx2); cnt.setAttribute("y",cy2); cnt.setAttribute("text-anchor","middle"); cnt.style.display="";
    cbg.setAttribute("x",cx2); cbg.setAttribute("y",cy2); cbg.setAttribute("text-anchor","middle"); cbg.style.display="";
    el("cornerCount").hidden=true;
    build();
  }

  // Largest dial width that fits the viewport without scrolling, for the current mode's
  // viewBox aspect (height = width / aspect must also fit). P.size is a percentage of it, so
  // 100% fills the screen on any display and the dial can never exceed it.
  function fitMax(){
    var vp=window.visualViewport, pad=16;
    var vw=(vp?vp.width:document.documentElement.clientWidth)-pad*2;
    var vh=(vp?vp.height:document.documentElement.clientHeight)-pad*2;
    var ar=P.mode==="full"?1:(P.mode==="portrait"?232/400:400/208); // viewBox width/height
    return Math.max(120,Math.min(vw,vh*ar));
  }
  function applySize(){el("dial").style.width=Math.round(fitMax()*P.size/100)+"px";}

  function clampDeps(){
    el("K").max=P.N; if(P.K>P.N){P.K=P.N;el("K").value=P.N;}
    var bmax=Math.max(1,Math.min(P.K,P.N-P.K)); el("S").max=bmax;
    if(P.bursts>bmax){P.bursts=bmax;el("S").value=bmax;}
  }
  function labels(){el("vN").textContent=P.N;el("vK").textContent=P.K;el("vI").textContent=P.interval+" min";el("vS").textContent=P.bursts;el("vSZ").textContent=P.size+"%";}
  el("N").addEventListener("input",function(){P.N=+this.value;clampDeps();P.K=+el("K").value;P.bursts=+el("S").value;labels();build();});
  el("K").addEventListener("input",function(){P.K=+this.value;clampDeps();P.bursts=+el("S").value;labels();build();});
  el("I").addEventListener("input",function(){P.interval=+this.value;labels();});
  el("S").addEventListener("input",function(){P.bursts=+this.value;clampDeps();P.bursts=+el("S").value;labels();build();});
  el("SZ").addEventListener("input",function(){P.size=+this.value;applySize();labels();});

  // ---- Zoom: pinch / ⌘-wheel resize the circle (clamped to the screen), never the page ----
  function setSize(pct){P.size=Math.max(20,Math.min(100,Math.round(pct)));el("SZ").value=P.size;applySize();labels();}
  function touchDist(t){var a=t[0],b=t[1];return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}
  var pinch=null,gActive=false,gBase=85;
  // iOS Safari pinch (non-standard gesture events give a clean cumulative scale factor).
  document.addEventListener("gesturestart",function(e){e.preventDefault();gActive=true;gBase=P.size;},{passive:false});
  document.addEventListener("gesturechange",function(e){e.preventDefault();setSize(gBase*e.scale);},{passive:false});
  document.addEventListener("gestureend",function(e){e.preventDefault();gActive=false;},{passive:false});
  // Generic two-finger pinch (Android/Chrome/etc.). preventDefault stops the page zooming.
  document.addEventListener("touchstart",function(e){if(e.touches.length===2&&!gActive)pinch={d0:touchDist(e.touches),s0:P.size};},{passive:false});
  document.addEventListener("touchmove",function(e){if(e.touches.length===2){e.preventDefault();if(!gActive&&pinch)setSize(pinch.s0*touchDist(e.touches)/pinch.d0);}},{passive:false});
  document.addEventListener("touchend",function(e){if(e.touches.length<2)pinch=null;});
  // Trackpad pinch and ctrl/⌘+wheel zoom on desktop.
  window.addEventListener("wheel",function(e){if(e.ctrlKey){e.preventDefault();setSize(P.size-e.deltaY*0.4);}},{passive:false});
  // Re-fit when the viewport changes (resize, rotate, browser-chrome show/hide).
  window.addEventListener("resize",applySize);
  if(window.visualViewport)window.visualViewport.addEventListener("resize",applySize);
  el("idsel").addEventListener("change",function(){P.idMethod=this.value;build();});
  el("lblpos").addEventListener("change",function(){P.labelPos=this.value;build();});
  function setSpeed(b){P.speed=+b.getAttribute("data-x");var kids=el("speed").children;
    for(var i=0;i<kids.length;i++)kids[i].className=kids[i]===b?"on":"";}
  el("speed").addEventListener("click",function(e){var b=e.target.closest("button");if(b)setSpeed(b);});
  // Highlight the speed button matching P.speed; fall back to 1x if none match.
  function applySpeedUI(){var kids=el("speed").children,found=false;
    for(var i=0;i<kids.length;i++){var on=+kids[i].getAttribute("data-x")===P.speed;kids[i].className=on?"on":"";if(on)found=true;}
    if(!found){P.speed=1;kids[0].className="on";}}

  // Shape: half / full / portrait, settable from the segmented control or by tapping
  // the centre of the dial (which cycles through the modes).
  function setMode(m){P.mode=(MODES.indexOf(m)<0)?"half":m;applyModeUI();applySize();applyLayout();}
  function applyModeUI(){var kids=el("mode").children;
    for(var i=0;i<kids.length;i++)kids[i].className=(kids[i].getAttribute("data-m")===P.mode)?"on":"";}
  el("mode").addEventListener("click",function(e){var b=e.target.closest("button");if(b)setMode(b.getAttribute("data-m"));});
  el("hit").addEventListener("click",function(){setMode(MODES[(MODES.indexOf(P.mode)+1)%MODES.length]);});

  var gear=el("gear"),panel=el("panel");
  function setPanel(open){panel.hidden=!open;gear.setAttribute("aria-expanded",String(open));}
  gear.addEventListener("click",function(){setPanel(panel.hidden);});
  // Close the panel when clicking/tapping anywhere outside the tools (gear + panel).
  document.addEventListener("click",function(e){if(!panel.hidden&&!el("tools").contains(e.target))setPanel(false);});

  // ---- Config codec: pack every setting into one tight base36 param ("c") ----
  // Each field maps a setting to a 0-based index in a fixed range (`c` = #values);
  // values are folded into one integer via mixed-radix, so the same FIELDS list
  // drives both pack and unpack and stays in sync.
  var SPEEDS=[1,60], IDS=["num","alpha","animal","none"];
  var FIELDS=[
    {c:19, enc:function(){return P.N-2;},        dec:function(i){P.N=i+2;}},
    {c:20, enc:function(){return P.K-1;},        dec:function(i){P.K=i+1;}},
    {c:9,  enc:function(){return P.interval-2;}, dec:function(i){P.interval=i+2;}},
    {c:20, enc:function(){return P.bursts-1;},   dec:function(i){P.bursts=i+1;}},
    {c:2,  enc:function(){return Math.max(0,SPEEDS.indexOf(P.speed));}, dec:function(i){P.speed=SPEEDS[i];}},
    {c:4,  enc:function(){return Math.max(0,IDS.indexOf(P.idMethod));}, dec:function(i){P.idMethod=IDS[i];}},
    {c:3,  enc:function(){return Math.max(0,MODES.indexOf(P.mode));}, dec:function(i){P.mode=MODES[i];}}
    // NB: circle size and dark mode are deliberately excluded — they are local
    // viewing preferences, not part of the shared config the QR encodes.
  ];
  function packConfig(){
    var acc=0;
    for(var i=0;i<FIELDS.length;i++){
      var idx=Math.max(0,Math.min(FIELDS[i].c-1,FIELDS[i].enc()));
      acc=acc*FIELDS[i].c+idx;
    }
    return acc.toString(36);
  }
  function unpackConfig(str){
    var acc=parseInt(str,36);
    if(isNaN(acc)||acc<0)return false;
    for(var i=FIELDS.length-1;i>=0;i--){ FIELDS[i].dec(acc%FIELDS[i].c); acc=Math.floor(acc/FIELDS[i].c); }
    return true;
  }
  function seedFromParams(){
    var q;try{q=new URLSearchParams(location.search);}catch(e){return;}
    if(!q.has("c")||!unpackConfig(q.get("c")))return;
  }
  // Force every control to reflect P, regardless of what the browser may have restored from a
  // previous visit (bfcache / autofill). Speed and mode have their own UI sync helpers.
  function syncUI(){
    el("N").value=P.N; el("K").value=P.K; el("I").value=P.interval; el("S").value=P.bursts;
    el("SZ").value=P.size; el("idsel").value=P.idMethod; el("lblpos").value=P.labelPos;
  }

  // ---- Dark mode: local viewing preference, persisted but never shared via QR ----
  var darkChk=el("dark"),root=document.documentElement,storedTheme=null;
  try{storedTheme=localStorage.getItem("pw-theme");}catch(e){}
  function sysDark(){try{return matchMedia("(prefers-color-scheme:dark)").matches;}catch(e){return false;}}
  if(storedTheme==="dark"||storedTheme==="light")root.setAttribute("data-theme",storedTheme);
  darkChk.checked=storedTheme?(storedTheme==="dark"):sysDark();
  darkChk.addEventListener("change",function(){
    var v=this.checked?"dark":"light";root.setAttribute("data-theme",v);
    try{localStorage.setItem("pw-theme",v);}catch(e){}
  });

  // ---- QR share: encode the current settings into the page URL ----
  function settingsURL(){
    var u=new URL(location.href);u.search="";
    u.searchParams.set("c",packConfig());
    return u.toString();
  }
  function buildQR(text){
    var qr=qrcode(0,"M");qr.addData(text);qr.make();
    var n=qr.getModuleCount(),q=4,d=n+2*q,o=['<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+d+' '+d+'" shape-rendering="crispEdges"><rect width="'+d+'" height="'+d+'" fill="#fff"/>'];
    for(var r=0;r<n;r++)for(var c=0;c<n;c++)if(qr.isDark(r,c))o.push('<rect x="'+(c+q)+'" y="'+(r+q)+'" width="1" height="1" fill="#000"/>');
    o.push('</svg>');return o.join("");
  }
  var qrModal=el("qrModal");
  function openQR(){var url=settingsURL();el("qrSvg").innerHTML=buildQR(url);el("qrUrl").textContent=url;qrModal.hidden=false;}
  function closeQR(){qrModal.hidden=true;}
  el("qrbtn").addEventListener("click",openQR);
  qrModal.addEventListener("click",closeQR);
  document.addEventListener("keydown",function(e){if(e.key==="Escape"&&!qrModal.hidden)closeQR();});

  seedFromParams();
  clampDeps(); syncUI(); applySize(); applyLayout(); labels(); applySpeedUI(); applyModeUI();
  lastSwitch=Math.floor(Date.now()/1000*P.speed/(P.interval*60));
  paint(Date.now()/1000*P.speed); // render the correct rotated state before the first frame
  requestAnimationFrame(loop);
})();
</script>
</html>
